<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
}
resize();
window.addEventListener('resize', () => { resize(); initStars(); });

// --- Stars ---
let stars = [];
function initStars() {
    stars = [];
    const count = Math.floor((W * H) / 800);
    for (let i = 0; i < count; i++) {
        stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.5 + 0.3,
            brightness: Math.random(),
            speed: Math.random() * 0.005 + 0.002,
            phase: Math.random() * Math.PI * 2
        });
    }
}
initStars();

// --- Planets ---
const planets = [
    { name: 'Mercury', radius: 60,  speed: 0.018, size: 3,   color: '#b5b5b5', glow: '#888888' },
    { name: 'Venus',   radius: 95,  speed: 0.012, size: 5,   color: '#e8cda0', glow: '#d4a84b' },
    { name: 'Earth',   radius: 135, speed: 0.009, size: 5.5, color: '#4da6ff', glow: '#2266aa' },
    { name: 'Mars',    radius: 175, speed: 0.007, size: 4,   color: '#e07040', glow: '#aa3311' },
    { name: 'Jupiter', radius: 240, speed: 0.004, size: 14,  color: '#d4a574', glow: '#b8860b' },
    { name: 'Saturn',  radius: 310, speed: 0.003, size: 11,  color: '#e8d088', glow: '#c4a44a', rings: true },
    { name: 'Uranus',  radius: 370, speed: 0.002, size: 8,   color: '#7ec8c8', glow: '#3a8a8a' },
    { name: 'Neptune', radius: 430, speed: 0.0015,size: 7.5, color: '#4466ee', glow: '#2233aa' }
];

planets.forEach(p => {
    p.angle = Math.random() * Math.PI * 2;
    p.trail = [];
    p.maxTrail = Math.floor(p.radius * 1.2);
});

// --- Asteroid belt ---
const asteroids = [];
for (let i = 0; i < 200; i++) {
    asteroids.push({
        angle: Math.random() * Math.PI * 2,
        radius: 200 + Math.random() * 30,
        speed: 0.005 + Math.random() * 0.002,
        size: Math.random() * 1.2 + 0.3,
        brightness: Math.random() * 0.5 + 0.3
    });
}

// --- Drawing ---
function drawStars(time) {
    for (const s of stars) {
        const twinkle = 0.5 + 0.5 * Math.sin(time * s.speed + s.phase);
        const alpha = s.brightness * twinkle + 0.2;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,240,${alpha.toFixed(2)})`;
        ctx.fill();
    }
}

function drawSun(time) {
    // Outer corona
    const coronaSize = 55 + 5 * Math.sin(time * 0.003);
    const grad3 = ctx.createRadialGradient(cx, cy, 10, cx, cy, coronaSize);
    grad3.addColorStop(0, 'rgba(255,200,50,0.35)');
    grad3.addColorStop(0.5, 'rgba(255,150,30,0.12)');
    grad3.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, coronaSize, 0, Math.PI * 2);
    ctx.fillStyle = grad3;
    ctx.fill();

    // Mid glow
    const grad2 = ctx.createRadialGradient(cx, cy, 5, cx, cy, 35);
    grad2.addColorStop(0, 'rgba(255,255,200,0.9)');
    grad2.addColorStop(0.4, 'rgba(255,200,80,0.6)');
    grad2.addColorStop(1, 'rgba(255,120,20,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, 35, 0, Math.PI * 2);
    ctx.fillStyle = grad2;
    ctx.fill();

    // Sun body
    const grad = ctx.createRadialGradient(cx - 3, cy - 3, 2, cx, cy, 18);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, '#fff8e0');
    grad.addColorStop(0.7, '#ffcc33');
    grad.addColorStop(1, '#ff8800');
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Sun highlight
    ctx.beginPath();
    ctx.arc(cx - 4, cy - 4, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
}

function drawOrbit(radius) {
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
}

function drawAsteroids(time) {
    for (const a of asteroids) {
        a.angle += a.speed;
        const x = cx + Math.cos(a.angle) * a.radius;
        const y = cy + Math.sin(a.angle) * a.radius;
        ctx.beginPath();
        ctx.arc(x, y, a.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,170,150,${a.brightness})`;
        ctx.fill();
    }
}

function drawPlanet(p, time) {
    const x = cx + Math.cos(p.angle) * p.radius;
    const y = cy + Math.sin(p.angle) * p.radius;

    // Trail
    p.trail.push({ x, y });
    if (p.trail.length > p.maxTrail) p.trail.shift();

    if (p.trail.length > 1) {
        for (let i = 1; i < p.trail.length; i++) {
            const alpha = (i / p.trail.length) * 0.15;
            ctx.beginPath();
            ctx.moveTo(p.trail[i - 1].x, p.trail[i - 1].y);
            ctx.lineTo(p.trail[i].x, p.trail[i].y);
            ctx.strokeStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
            // Simpler approach for hex colors
            ctx.strokeStyle = `rgba(${parseInt(p.color.slice(1,3),16)},${parseInt(p.color.slice(3,5),16)},${parseInt(p.color.slice(5,7),16)},${alpha})`;
            ctx.lineWidth = p.size * 0.4;
            ctx.stroke();
        }
    }

    // Planet glow
    const glowGrad = ctx.createRadialGradient(x, y, p.size * 0.5, x, y, p.size * 3);
    glowGrad.addColorStop(0, p.glow + '44');
    glowGrad.addColorStop(1, p.glow + '00');
    ctx.beginPath();
    ctx.arc(x, y, p.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = glowGrad;
    ctx.fill();

    // Saturn rings
    if (p.rings) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(0.4);
        ctx.scale(1, 0.35);

        // Outer ring
        ctx.beginPath();
        ctx.arc(0, 0, p.size * 2.2, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(210,190,140,0.5)';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Inner ring
        ctx.beginPath();
        ctx.arc(0, 0, p.size * 1.7, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(190,170,120,0.35)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.restore();
    }

    // Planet body
    const bodyGrad = ctx.createRadialGradient(x - p.size * 0.3, y - p.size * 0.3, p.size * 0.1, x, y, p.size);
    bodyGrad.addColorStop(0, '#ffffff');
    bodyGrad.addColorStop(0.3, p.color);
    bodyGrad.addColorStop(1, p.glow);
    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Specular highlight
    ctx.beginPath();
    ctx.arc(x - p.size * 0.25, y - p.size * 0.25, p.size * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();
}

// --- Main loop ---
let lastTime = 0;
function animate(time) {
    const dt = time - lastTime;
    lastTime = time;

    // Clear
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, W, H);

    // Subtle nebula background
    const nebGrad = ctx.createRadialGradient(cx * 0.7, cy * 0.6, 50, cx * 0.7, cy * 0.6, W * 0.6);
    nebGrad.addColorStop(0, 'rgba(40,20,80,0.08)');
    nebGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = nebGrad;
    ctx.fillRect(0, 0, W, H);

    const nebGrad2 = ctx.createRadialGradient(cx * 1.3, cy * 1.2, 30, cx * 1.3, cy * 1.2, W * 0.5);
    nebGrad2.addColorStop(0, 'rgba(20,40,80,0.06)');
    nebGrad2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = nebGrad2;
    ctx.fillRect(0, 0, W, H);

    // Stars
    drawStars(time);

    // Orbits
    for (const p of planets) drawOrbit(p.radius);

    // Asteroid belt
    drawAsteroids(time);

    // Sun
    drawSun(time);

    // Planets
    for (const p of planets) {
        p.angle += p.speed;
        drawPlanet(p, time);
    }

    // Labels (subtle)
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    for (const p of planets) {
        const x = cx + Math.cos(p.angle) * p.radius;
        const y = cy + Math.sin(p.angle) * p.radius;
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText(p.name, x, y - p.size - 6);
    }

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
